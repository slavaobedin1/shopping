html,body{height:100%}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;min-height:100vh}
.header{background:var(--surface);border-bottom:2px solid var(--border);padding:16px 16px 0;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{font-size:19px;font-weight:900;letter-spacing:-.5px}
.logo span{color:var(--accent)}
.date-tag{background:var(--accent-l);color:var(--accent);border-radius:20px;padding:4px 11px;font-size:11px;font-weight:700}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:5px}
.prog-count{font-weight:800;color:var(--accent)}
.progress-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:3px;transition:width .4s}
.prog-warn{font-size:11px;color:var(--yellow);font-weight:700;padding:4px 0 6px;text-align:center;opacity:0;transition:opacity .3s}
.prog-warn.show{opacity:1}
.tabs{display:flex;margin-top:8px}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.content{padding:14px 12px 110px}
.cat-block{margin-bottom:12px;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.cat-header{display:flex;align-items:center;gap:8px;padding:11px 13px;background:var(--surface);cursor:pointer;user-select:none;border-bottom:1px solid var(--border)}
.cat-emoji{font-size:18px}
.cat-title{font-size:14px;font-weight:800;flex:1}
.cat-badges{display:flex;gap:5px;flex-wrap:wrap}
.cat-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.b-done{background:var(--green-l);color:var(--green)}
.b-skip{background:var(--gray-l);color:var(--gray)}
.b-need{background:var(--red-l);color:var(--red)}
.b-left{background:var(--yellow-l);color:var(--yellow)}
.cat-chev{font-size:10px;color:var(--muted);transition:transform .2s}
.cat-header.open .cat-chev{transform:rotate(180deg)}
.item{display:flex;align-items:center;gap:9px;padding:10px 13px;background:var(--surface);border-bottom:1px solid var(--border);transition:background .12s}
.item:last-child{border-bottom:none}
.item.s-yes{background:var(--green-l)}
.item.s-no{background:var(--red-l)}
.item.s-skip{background:var(--gray-l);opacity:.6}
.status-btn{width:34px;height:34px;border-radius:50%;border:2px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .12s;font-family:'Heebo',sans-serif;font-weight:800}
.status-btn.yes{border-color:var(--green);background:var(--green);color:#fff}
.status-btn.no{border-color:var(--red);background:var(--red);color:#fff}
.status-btn.skip{border-color:var(--gray);background:var(--gray);color:#fff;font-size:10px}
.item-info{flex:1;min-width:0}
.item-name{font-size:13px;font-weight:700}
.item-sub{font-size:11px;color:var(--muted)}
.status-label{font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px;flex-shrink:0;white-space:nowrap}
.sl-yes{background:var(--green-l);color:var(--green)}
.sl-no{background:var(--red-l);color:var(--red)}
.sl-skip{background:var(--gray-l);color:var(--gray)}
.sl-unk{background:var(--yellow-l);color:var(--yellow)}
.qty-wrap{display:flex;align-items:center;gap:5px;flex-shrink:0}
.qty-btn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.qty-num{font-size:14px;font-weight:800;min-width:20px;text-align:center}
.legend{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 13px;margin-bottom:12px}
.legend-title{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px}
.legend-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--muted)}
.ld{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;flex-shrink:0;font-weight:800}
.ld-unk{background:var(--border);color:var(--muted)}
.ld-yes{background:var(--green)}
.ld-no{background:var(--red)}
.ld-skip{background:var(--gray);font-size:9px}
.pdf-locked{background:var(--surface);border:2px dashed var(--border);border-radius:var(--radius);padding:30px 20px;text-align:center}
.lock-icon{font-size:42px;margin-bottom:10px}
.pdf-locked h3{font-size:16px;font-weight:800;color:var(--muted);margin-bottom:8px}
.pdf-locked p{font-size:13px;color:var(--muted);line-height:1.7}
.items-left{display:inline-block;margin-top:12px;background:var(--yellow-l);color:var(--yellow);border-radius:20px;padding:6px 18px;font-size:13px;font-weight:800}
.pdf-unlocked{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.pdf-hdr{background:linear-gradient(135deg,var(--accent),#7b5ea7);padding:18px;color:#fff}
.pdf-hdr h2{font-size:18px;font-weight:900;margin-bottom:3px}
.pdf-hdr p{font-size:12px;opacity:.8}
.pdf-body{padding:14px}
.pdf-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:8px;margin-bottom:6px}
.pr-need{background:var(--red-l)}
.pr-ok{background:var(--green-l)}
.pr-skip{background:var(--gray-l);opacity:.7}
.pr-name{font-size:13px;font-weight:700}
.pr-count{font-size:12px;font-weight:800}
.pr-need .pr-count{color:var(--red)}
.pr-ok .pr-count{color:var(--green)}
.pr-skip .pr-count{color:var(--gray)}
.btn-gen{width:100%;margin-top:14px;background:linear-gradient(135deg,var(--accent),#7b5ea7);color:#fff;border:none;border-radius:var(--radius-sm);padding:15px;font-family:'Heebo',sans-serif;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 20px rgba(91,62,143,.3);display:flex;align-items:center;justify-content:center;gap:8px}
.add-form{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:12px}
.add-form h3{font-size:14px;font-weight:800;margin-bottom:10px}
.form-group{margin-bottom:8px}
.form-label{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:3px;display:block}
.form-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;outline:none;direction:rtl;transition:border .2s}
.form-input:focus{border-color:var(--accent)}
.form-select{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;outline:none;direction:rtl}
.btn-add{width:100%;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:11px;font-weight:800;font-family:'Heebo',sans-serif;font-size:14px;cursor:pointer}
.manage-item{display:flex;align-items:center;gap:9px;padding:9px 13px;background:var(--surface);border-bottom:1px solid var(--border)}
.manage-item:last-child{border-bottom:none}
.manage-name{flex:1;font-size:12px;font-weight:600}
.btn-del{background:var(--red-l);border:1px solid var(--red);border-radius:6px;color:var(--red);padding:3px 9px;font-size:11px;cursor:pointer;font-family:'Heebo',sans-serif;font-weight:700}
.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--surface);border-top:1.5px solid var(--border);padding:10px 14px;display:flex;gap:8px;box-shadow:0 -4px 20px rgba(0,0,0,.08);z-index:50}
.btn-reset{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:11px;color:var(--muted);font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.btn-pdf{flex:2;background:linear-gradient(135deg,var(--accent),#7b5ea7);color:#fff;border:none;border-radius:10px;padding:11px;font-family:'Heebo',sans-serif;font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 4px 14px rgba(91,62,143,.3)}
.btn-pdf:disabled{background:#ccc;box-shadow:none;cursor:not-allowed}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--text);color:#fff;border-radius:10px;padding:9px 18px;font-size:12px;font-weight:700;opacity:0;transition:all .25s;pointer-events:none;z-index:300;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="logo">🛒 קניות <span>משפחתיות</span></div>

const KEY='shopping_v4';
function loadState(){try{const s=localStorage.getItem(KEY);if(s)return JSON.parse(s);}catch(e){}return{items:DEFAULTS.map((d,i)=>({...d,id:'i'+i,status:'unchecked'})),catCollapsed:{}};}
function save(){localStorage.setItem(KEY,JSON.stringify(state));updateProgress();}
let state=loadState();
let tab='list';
const days=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const d=new Date();
document.getElementById('dateTag').textContent=`יום ${days[d.getDay()]}, ${d.getDate()}/${d.getMonth()+1}`;
function updateProgress(){
  const total=state.items.length;
  const checked=state.items.filter(i=>i.status!=='unchecked').length;
  const pct=total?Math.round(checked/total*100):0;
  document.getElementById('progText').textContent=checked+' / '+total;
  document.getElementById('progFill').style.width=pct+'%';
  const done=checked===total;
  document.getElementById('progWarn').classList.toggle('show',!done&&checked>0);
  const btn=document.getElementById('btnPDF');
  if(btn){btn.disabled=!done;btn.textContent=done?'📄 צור דוח PDF':'🔒 נותרו '+(total-checked);}
}
function setTab(t){
  tab=t;
  ['list','report','manage'].forEach(x=>document.getElementById('tab-'+x).classList.toggle('active',x===t));
  document.getElementById('bottomBar').style.display=t==='manage'?'none':'flex';
  render();
}
function render(){
  const el=document.getElementById('content');
  if(tab==='list')el.innerHTML=renderList();
  else if(tab==='report')el.innerHTML=renderReport();
  else el.innerHTML=renderManage();
}
function groupBy(){const g={};state.items.forEach(i=>{if(!g[i.cat])g[i.cat]=[];g[i.cat].push(i);});return g;}
function esc(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

      <div class="legend-item"><div class="ld ld-unk">?</div><span>לא נבדק</span></div>
      <div class="legend-item"><div class="ld ld-yes">✓</div><span>יש בבית</span></div>
      <div class="legend-item"><div class="ld ld-no">✗</div><span>חסר — לקנות</span></div>
      <div class="legend-item"><div class="ld ld-skip">דלג</div><span>השבוע לא</span></div>
    </div>
  </div>`;
  const groups=groupBy();
  Object.entries(groups).forEach(([cat,items])=>{
    const done=items.filter(i=>i.status!=='unchecked').length;
    const need=items.filter(i=>i.status==='no').length;
    const skip=items.filter(i=>i.status==='skip').length;
    const total=items.length;
    const isOpen=!state.catCollapsed[cat];
    html+=`<div class="cat-block">
      <div class="cat-header ${isOpen?'open':''}" onclick="toggleCat('${esc(cat)}')">
        <span class="cat-emoji">${cat.split(' ')[0]}</span>
        <span class="cat-title">${cat.split(' ').slice(1).join(' ')}</span>
        <div class="cat-badges">
          <span class="cat-badge b-done">${done}/${total}</span>
          ${need>0?`<span class="cat-badge b-need">${need} חסר</span>`:''}
          ${skip>0?`<span class="cat-badge b-skip">${skip} דולג</span>`:''}
          ${done<total?`<span class="cat-badge b-left">${total-done} נותרו</span>`:''}
        </div>
        <span class="cat-chev">${isOpen?'▲':'▼'}</span>
      </div>
      ${isOpen?`<div>${items.map(renderItem).join('')}</div>`:''}
    </div>`;
  });
  return html;
}
function renderItem(item){
  const sc=item.status;
  const cls=sc==='yes'?'s-yes':sc==='no'?'s-no':sc==='skip'?'s-skip':'';
  const bc=sc==='yes'?'yes':sc==='no'?'no':sc==='skip'?'skip':'';
  const bi=sc==='yes'?'✓':sc==='no'?'✗':sc==='skip'?'דלג':'?';
  const sl=sc==='yes'?'sl-yes':sc==='no'?'sl-no':sc==='skip'?'sl-skip':'sl-unk';
  const st=sc==='yes'?'יש ✓':sc==='no'?'לקנות':sc==='skip'?'השבוע לא':'לא נבדק';
  return `<div class="item ${cls}">
    <button class="status-btn ${bc}" onclick="cycle('${item.id}')">${bi}</button>
    <div class="item-info">
      <div class="item-name">${item.name}</div>
      ${item.note?`<div class="item-sub">${item.note}</div>`:''}
    </div>
    <span class="status-label ${sl}">${st}</span>
    <div class="qty-wrap">
      <button class="qty-btn" onclick="chQty('${item.id}',-1)">−</button>
      <span class="qty-num">${item.qty}</span>
      <button class="qty-btn" onclick="chQty('${item.id}',1)">+</button>
    </div>
  </div>`;
}
function renderReport(){
  const total=state.items.length;
  const checked=state.items.filter(i=>i.status!=='unchecked').length;
  if(checked<total){
    return `<div class="pdf-locked">
      <div class="lock-icon">🔒</div>
      <h3>הדוח נעול</h3>
      <p>יש לסמן <strong>כל המוצרים</strong> ברשימה<br>(יש בבית / חסר / השבוע לא)<br>לפני שניתן לייצא דוח.</p>
      <div class="items-left">נותרו ${total-checked} פריטים לא מסומנים</div>
    </div>`;
  }
  const need=state.items.filter(i=>i.status==='no');
  const groups=groupBy();
  let rows='';
  Object.entries(groups).forEach(([cat,items])=>{
    const n=items.filter(i=>i.status==='no').length;
    const s=items.filter(i=>i.status==='skip').length;
    const allSkip=s===items.length;
    const cls=n>0?'pr-need':allSkip?'pr-skip':'pr-ok';
    const label=n>0?n+' לקנות':allSkip?'דולג השבוע':'✓ יש הכל';
    rows+=`<div class="pdf-row ${cls}"><span class="pr-name">${cat}</span><span class="pr-count">${label}</span></div>`;
  });

  // בניית תצוגת הרשימה המלאה להדפסה
  let printRows='';
  Object.entries(groups).forEach(([cat,items])=>{
    const n=items.filter(i=>i.status==='no');
    if(!n.length) return;
    printRows+=`<div class="p-cat">${cat}</div>`;
    n.forEach(it=>{
      printRows+=`<div class="p-item">
        <span>${it.name}${it.note?' <small>('+it.note+')</small>':''}</span>
        <span class="p-qty">${it.qty} יח׳</span>
        <span class="p-check"></span>
      </div>`;
    });
  });

  return `<div class="pdf-unlocked">
    <div class="pdf-hdr"><h2>📋 רשימת קניות מוכנה</h2><p>${document.getElementById('dateTag').textContent} · ${need.length} מוצרים לרכישה</p></div>
    <div class="pdf-body">
      ${rows}
      <button class="btn-gen" onclick="printDoc()">📄 צור PDF</button>
    </div>
  </div>
  <div id="printDoc" style="display:none">
    <style>
      #printDoc { direction:rtl; font-family:Arial,sans-serif; padding:20px; }
      .p-title { background:linear-gradient(135deg,#5b3e8f,#7b5ea7); color:#fff; border-radius:10px; padding:16px 20px; margin-bottom:20px; }
      .p-title h1 { font-size:20px; font-weight:900; margin:0 0 4px; }
      .p-title p  { font-size:12px; opacity:.8; margin:0; }
      .p-cat  { font-size:14px; font-weight:800; color:#5b3e8f; border-bottom:2px solid #e8e0d0; padding:8px 0 4px; margin:14px 0 6px; }
      .p-item { display:flex; align-items:center; padding:7px 10px; border-bottom:1px solid #f0ece4; gap:8px; }
      .p-item:nth-child(even) { background:#faf7f2; }
      .p-item span:first-child { flex:1; font-size:13px; font-weight:600; }
      .p-item small { color:#8a7d6b; font-size:11px; }
      .p-qty  { font-size:13px; font-weight:800; color:#5b3e8f; min-width:40px; text-align:center; }
      .p-check { width:20px; height:20px; border:2px solid #ccc; border-radius:4px; flex-shrink:0; }
      .p-footer { margin-top:20px; padding:10px; background:#f0ecfa; border-radius:8px; text-align:center; font-size:11px; color:#8a7d6b; }
    </style>
    <div class="p-title">
      <h1>🛒 רשימת קניות</h1>
      <p>${document.getElementById('dateTag').textContent} · ${need.length} מוצרים לרכישה</p>
    </div>
    ${printRows}
    <div class="p-footer">נוצר ע"י אפליקציית קניות משפחתית</div>
  </div>`;
}
function renderManage(){
  const catOpts=[...new Set(DEFAULTS.map(i=>i.cat))].map(c=>`<option value="${c}">${c}</option>`).join('');
  const groups=groupBy();
  let blocks='';
  Object.entries(groups).forEach(([cat,items])=>{
    blocks+=`<div class="cat-block">
      <div class="cat-header open" style="cursor:default">
        <span class="cat-emoji">${cat.split(' ')[0]}</span>
        <span class="cat-title">${cat.split(' ').slice(1).join(' ')}</span>
      </div>
      <div>${items.map(i=>`<div class="manage-item"><span class="manage-name">${i.name}${i.note?' · '+i.note:''}</span><button class="btn-del" onclick="removeItem('${i.id}')">מחק</button></div>`).join('')}</div>
    </div>`;
  });
  return `<div class="add-form">
    <h3>➕ הוסף מוצר</h3>
    <div class="form-group"><label class="form-label">שם המוצר</label><input class="form-input" id="nName" placeholder="שם המוצר"/></div>
    <div class="form-group"><label class="form-label">קטגוריה</label><select class="form-select" id="nCat">${catOpts}</select></div>
    <div class="form-group"><label class="form-label">הערה (אופציונלי)</label><input class="form-input" id="nNote" placeholder="כמות, מותג..."/></div>
    <button class="btn-add" onclick="addItem()">➕ הוסף</button>
  </div>
  <div style="margin-bottom:8px"><div style="font-size:12px;font-weight:800;color:var(--muted);padding:0 2px 8px">כל המוצרים (${state.items.length})</div>${blocks}</div>`;
}
function toggleCat(cat){state.catCollapsed[cat]=!state.catCollapsed[cat];save();render();}
function cycle(id){
  const item=state.items.find(i=>i.id===id);if(!item)return;
  const nxt={unchecked:'yes',yes:'no',no:'skip',skip:'unchecked'};
  item.status=nxt[item.status];save();
  const msgs={yes:'✅ '+item.name+' — יש בבית',no:'🛒 '+item.name+' — לקנות',skip:'⏭️ '+item.name+' — השבוע לא',unchecked:'↩️ '+item.name+' — לא מסומן'};
  showToast(msgs[item.status]);render();
}
function chQty(id,delta){const item=state.items.find(i=>i.id===id);if(!item)return;item.qty=Math.max(1,item.qty+delta);save();render();}
function addItem(){
  const name=document.getElementById('nName').value.trim();
  const cat=document.getElementById('nCat').value;
  const note=document.getElementById('nNote').value.trim();
  if(!name){showToast('⚠️ יש להזין שם');return;}
  state.items.push({id:'i'+Date.now(),cat,name,qty:1,note,status:'unchecked'});
  save();render();showToast('✅ '+name+' נוסף');
}
function removeItem(id){
  const item=state.items.find(i=>i.id===id);
  if(!item||!confirm('למחוק "'+item.name+'"?'))return;
  state.items=state.items.filter(i=>i.id!==id);save();render();
}
function resetAll(){
  if(!confirm('לאפס את כל הסימונים לשבוע חדש?'))return;
  state.items.forEach(i=>i.status='unchecked');save();render();showToast('🔄 הרשימה אופסה');
}
function tryPDF(){
  const total=state.items.length;
  const checked=state.items.filter(i=>i.status!=='unchecked').length;
  if(checked<total){showToast('🔒 נותרו '+(total-checked)+' פריטים');setTab('list');document.getElementById('progWarn').classList.add('show');return;}
  genPDF();
}
function printDoc(){
  const printContent = document.getElementById('printDoc');
  if(!printContent) return;

  // העתקת תוכן להדפסה
  const originalBody = document.body.innerHTML;
  document.body.innerHTML = printContent.innerHTML;
  window.print();
  document.body.innerHTML = originalBody;

  // החזרת האפליקציה
  render();
  updateProgress();
  if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js'); }
}

function shareList(){
  const need=state.items.filter(i=>i.status==='no');
  const groups=groupBy();
  const date=document.getElementById('dateTag').textContent;
  if(!need.length){ showToast('🎉 אין מה לקנות השבוע!'); return; }
  let msg=`🛒 *רשימת קניות* — ${date}\n━━━━━━━━━━━━━\n`;
  Object.entries(groups).forEach(([cat,items])=>{
    const n=items.filter(i=>i.status==='no');
    if(!n.length) return;
    msg+=`\n${cat}\n`;
    n.forEach(it=>{ msg+=`▪️ ${it.name}`; if(it.qty>1)msg+=` × ${it.qty}`; if(it.note)msg+=` (${it.note})`; msg+='\n'; });
  });
  msg+=`\n━━━━━━━━━━━━━\nסה"כ ${need.length} מוצרים`;
  if(navigator.share){
    navigator.share({title:'רשימת קניות',text:msg}).catch(()=>openWA(msg));
  } else { openWA(msg); }
}
function openWA(msg){ window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank'); showToast('📤 נפתח וואטסאפ!'); }
function genPDF(){ shareList(); }
let tt;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2300);}
render();updateProgress();
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js'); }

</script>
</body>
</html>
